# file path: backend/template.yaml
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AlphaBetaTracker
  SAM Template for Live Market Alpha & Beta Tracker

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'content-type'"
      AllowOrigin: "'*'"
  Function:
    Timeout: 60
    MemorySize: 3008
    Runtime: python3.12

Resources:
  AlphaBetaFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Architectures:
        - arm64
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref AlphaBetaTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AlphaBetaTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /metrics
            Method: get

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: chat.lambda_handler
      Architectures:
        - arm64
      Environment:
        Variables:
          GEMINI_API_KEY: ""
          DYNAMODB_TABLE: !Ref AlphaBetaTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AlphaBetaTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /chat
            Method: post

  AlphaBetaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  MetricsApiUrl:
    Description: "API Gateway endpoint URL for Metrics"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/metrics/"
  ChatApiUrl:
    Description: "API Gateway endpoint URL for Chat"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chat"